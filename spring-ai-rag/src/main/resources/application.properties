spring.application.name=spring-ai-rag
server.port=8082

# ============================================================
# Chat 配置（DeepSeek API，自动装配）
# ============================================================
spring.ai.openai.api-key=${DEEPSEEK_API_KEY}
spring.ai.openai.base-url=https://api.deepseek.com
spring.ai.openai.chat.options.model=deepseek-v4-pro
spring.ai.openai.chat.options.extra-body.thinking.type=disabled

# ============================================================
# Embedding 配置（阿里云 DashScope，手动构建，与 Chat 完全分离）
# ============================================================
spring.ai.rag.embedding.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
spring.ai.rag.embedding.api-key=${DASHSCOPE_API_KEY}
spring.ai.rag.embedding.model=text-embedding-v4
spring.ai.rag.embedding.embeddings-path=/embeddings

# 排除 OpenAI Embedding 自动装配，避免使用 DeepSeek 不存在的 /v1/embeddings
spring.autoconfigure.exclude=org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration

# 日志
logging.level.org.springframework.ai.rag=DEBUG
