spring.application.name=spring-ai-rag
server.port=8082

# Chat 配置（自动装配，沿用已有 DeepSeek Chat API）
spring.ai.openai.api-key=${DEEPSEEK_API_KEY}
spring.ai.openai.base-url=https://api.deepseek.com
spring.ai.openai.chat.options.model=deepseek-v4-pro
spring.ai.openai.chat.options.extra-body.thinking.type=disabled

# Embedding 配置（独立手动构建，与 Chat 完全分离，可单独配置地址/路径/模型）
spring.ai.rag.embedding.base-url=https://api.deepseek.com
spring.ai.rag.embedding.api-key=${DEEPSEEK_API_KEY}
spring.ai.rag.embedding.model=deepseek-embedding
spring.ai.rag.embedding.embeddings-path=/v1/embeddings

# 日志
logging.level.org.springframework.ai.rag=DEBUG
