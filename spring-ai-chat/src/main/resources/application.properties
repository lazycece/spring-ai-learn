spring.application.name=spring-ai-chat

# DeepSeek (OpenAI-compatible)
spring.ai.openai.api-key=${DEEPSEEK_API_KEY}
spring.ai.openai.base-url=https://api.deepseek.com
spring.ai.openai.chat.model=deepseek-v4-pro
spring.ai.openai.chat.extra-body.thinking.type=disabled

# Spring AI observability logging
logging.level.org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor=DEBUG

# MCP Client
spring.ai.mcp.client.sse.connections.ecommerce.url=http://localhost:8081
